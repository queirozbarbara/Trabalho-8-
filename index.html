<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadastro</title>

<style>
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #f1f5f9;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
  }

  .container {
    background: white;
    padding: 30px;
    width: 350px;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    text-align: center;
  }

  h2 { color: #1e40af; margin-bottom: 20px; }

  input {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border: 1px solid #ddd;
    border-radius: 6px;
    box-sizing: border-box; /* Garante que o padding não aumente a largura */
  }

  button {
    padding: 12px;
    width: 100%;
    background: #1e40af;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
    margin-top: 10px;
    transition: background 0.3s;
  }

  button:hover { background: #1e3a8a; }

  #mensagem {
    margin-top: 20px;
    font-weight: 500;
    color: #334155;
  }
</style>
</head>

<body>

<div class="container">
  <h2>Cadastro</h2>

  <input type="text" id="nome" placeholder="Digite seu nome">
  <input type="email" id="email" placeholder="Digite seu e-mail">
  <input type="number" id="idade" placeholder="Digite sua idade">

  <button onclick="validar()">Enviar</button>

  <p id="mensagem"></p>
</div>

<script>
function validar() {
  // Captura dos valores
  const nome = document.getElementById("nome").value.trim();
  const email = document.getElementById("email").value.trim();
  const idade = document.getElementById("idade").value;
  const msgElemento = document.getElementById("mensagem");

  // Regex simples para validar formato de e-mail
  const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

  // 1. Validação de campos vazios
  if (nome === "" || email === "" || idade === "") {
    msgElemento.innerText = "⚠️ Por favor, preencha todos os campos!";
    msgElemento.style.color = "red";
    return;
  }

  // 2. Validação de formato de e-mail
  if (!emailPattern.test(email)) {
    msgElemento.innerText = "📧 Por favor, insira um e-mail válido.";
    msgElemento.style.color = "red";
    return;
  }

  // 3. Validação de idade
  if (idade < 18) {
    msgElemento.innerText = `Olá ${nome}, o cadastro é permitido apenas para maiores de 18 anos.`;
    msgElemento.style.color = "#b91c1c";
  } else {
    // Mensagem personalizada de sucesso
    msgElemento.innerText = `✅ Sucesso! Bem-vindo(a), ${nome}. Enviamos os detalhes para ${email}.`;
    msgElemento.style.color = "#15803d";
  }
}
</script>

</body>
</html>
